{% extends "main.html" %}

{% block tabs %}
{{ super() }}
<style>
  .md-header {
    position: initial
  }

  .md-main__inner {
    margin: 0
  }

  .md-content {
    display: none
  }

  @media screen and (min-width: 60em) {
    .md-sidebar--secondary {
      display: none
    }
  }

  @media screen and (min-width: 76.25em) {
    .md-sidebar--primary {
      display: none
    }
  }
</style>
<section class="mdx-container">
  <div class="md-grid md-typeset">
    <div class="mdx-hero">
      <div class="mdx-hero__image">
        <img src="LAMPrEY1.png" alt="LAMPrEY logo" width="500" draggable="false"
          style="max-height: 375px; width: auto; object-fit: contain;">
      </div>
      <div class="mdx-hero__content">
        <h1 class="mdx-hero__title">LAMPrEY</h1>
        <p class="mdx-hero__tagline">A Python-based automated quality control tool for large-scale proteomics datasets .</p>
        <div class="mdx-hero__actions">
          <a href="{{ 'getting-started/' | url }}" title="Getting started" class="md-button md-button--primary">
            Getting started
          </a>
          <a href="{{ 'demo/' | url }}" title="About" class="md-button">
            Quick start
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block content %}{% endblock %}
{% block footer %}{% endblock %}
